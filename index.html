<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOL Entity Dashboard</title>
    <style>
        /* FAIL-SAFE STYLES: This keeps it dark even if the CSS file fails */
        body { background-color: #1a0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .main-header { text-align: center; border-bottom: 2px solid #3d2a2a; padding-bottom: 20px; margin-bottom: 30px; }
        .emblem { width: 100px; }
        
        .top-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #2a1b1b; border: 1px solid #4a3535; padding: 25px; border-radius: 8px; text-align: center; }
        .stat-card h2 { color: #ffca28; font-size: 2.2rem; margin: 10px 0; }
        .sub-label { color: #888; font-size: 0.85rem; text-transform: uppercase; }

        .content-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .report-card { background: #2a1b1b; padding: 20px; margin-bottom: 15px; border-radius: 6px; border-left: 5px solid #ffca28; }
        
        .status-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }
        .growing { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .dormant { background: rgba(136, 136, 136, 0.2); color: #888; border: 1px solid #444; }

        .leaderboard-list { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; }
        .leader-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #3d2a2a; }
        
        @media (max-width: 800px) { .top-stats-grid, .content-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="main-header">
            <img src="1d0f5fec-ff25-43a3-a46e-ec5a76dd300d-removebg-preview.png" alt="Emblem" class="emblem">
            <h1>ENTITY DASHBOARD</h1>
            <div id="counter" style="color: #666; font-size: 0.8rem;">INITIALIZING...</div>
        </header>

        <div class="top-stats-grid">
            <div class="stat-card">
                <span class="sub-label">🏆 BEST ENTITY</span>
                <h2 id="best-entity">---</h2>
                <div id="best-entity-xp" style="color: #aaa;">0 XP THIS WEEK</div>
            </div>
            <div class="stat-card">
                <span class="sub-label">🔥 TOP HOSTER</span>
                <h2 id="best-hoster">---</h2>
                <div id="best-hoster-count" style="color: #aaa;">0 EVENTS</div>
            </div>
        </div>

        <div class="content-layout">
            <section>
                <h2 style="border-bottom: 1px solid #444; padding-bottom: 10px;">Entity Reports</h2>
                <div id="entity-grid"></div>
            </section>

            <section>
                <h2 style="border-bottom: 1px solid #444; padding-bottom: 10px;">Host Leaderboard</h2>
                <div id="host-leaderboard" class="leaderboard-list"></div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
